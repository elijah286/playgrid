name: Functional tests

# Drives the PRODUCTION app through core user workflows (headless Chromium) and
# ingests screenshots + pass/fail + timing into the Site Admin "Functional
# Testing" tab. Three triggers:
#   - after a successful deploy (the regression gate),
#   - nightly (catches data/state drift not tied to a deploy),
#   - manual ("Run workflow" button, or the Site Admin "Run Coach Cal tests"
#     button which dispatches this with suite=cal).
#
# Suite: post-deploy + nightly always run "core" (every spec EXCEPT Coach Cal).
# The Coach Cal specs drive the live LLM on prod and spend real tokens, so they
# only run when dispatched with suite=cal.
on:
  workflow_run:
    workflows: ["Deploy to Cloud Run"]
    types: [completed]
  schedule:
    - cron: "0 8 * * *" # 08:00 UTC nightly
  workflow_dispatch:
    inputs:
      suite:
        description: "Which suite to run"
        type: choice
        options:
          - core
          - cal
        default: core

permissions:
  contents: read

jobs:
  functional:
    runs-on: ubuntu-latest
    # Microsoft's official Playwright image ships Chromium + every OS dependency
    # pre-installed, so we never re-download/`apt`-install the browser per run.
    # The tag MUST match the pinned @playwright/test version in package.json —
    # the browser build is baked in at that version.
    container: mcr.microsoft.com/playwright:v1.61.1-jammy
    # For the post-deploy trigger, only run when the deploy actually succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    concurrency:
      group: functional-tests
      cancel-in-progress: true
    env:
      BASE_URL: https://www.xogridmaker.com
      INGEST_URL: https://www.xogridmaker.com/api/functional-tests/ingest
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      FUNC_TEST_COACH_EMAIL: ${{ secrets.FUNC_TEST_COACH_EMAIL }}
      FUNC_TEST_COACH_PASSWORD: ${{ secrets.FUNC_TEST_COACH_PASSWORD }}
      FUNC_TEST_PLAYER_EMAIL: ${{ secrets.FUNC_TEST_PLAYER_EMAIL }}
      FUNC_TEST_PLAYER_PASSWORD: ${{ secrets.FUNC_TEST_PLAYER_PASSWORD }}
      # Deployed commit for post-deploy; the workflow's own SHA otherwise.
      GIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      FUNCTEST_TRIGGER: ${{ github.event_name == 'workflow_run' && 'post_deploy' || github.event_name == 'schedule' && 'nightly' || 'manual' }}
      # Only a manual dispatch can select a suite; post-deploy + nightly are
      # always "core" (no Coach Cal → no token spend).
      FUNCTEST_SUITE: ${{ github.event.inputs.suite || 'core' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # No `playwright install` — the container already has the matching browser.

      # Keep the dedicated test accounts present + passwords in sync (idempotent).
      - name: Seed test accounts
        run: npm run seed:functest

      - name: Run functional tests
        # Don't fail the job on a red scenario — the run is still ingested and
        # surfaced (it also pushes admins via system_notices). The admin tab is
        # the signal, not the GH check.
        run: npx playwright test || true

      - name: Clean up stray test data
        # Safety net for any __functest entity a crashed run left behind (the
        # specs clean up their own in afterAll). Only touches >1h-old rows.
        if: always()
        run: npm run --silent functest:cleanup || node scripts/functest-cleanup.mjs || true

      - name: Prune old runs (storage retention)
        # Keep only the most recent FUNCTEST_RETAIN_RUNS runs; delete older run
        # rows + their GIFs/stills so storage stays bounded for nightly.
        if: always()
        env:
          FUNCTEST_RETAIN_RUNS: "14"
        run: npm run --silent functest:retention || node scripts/functest-retention.mjs || true

      - name: Upload Playwright report (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
