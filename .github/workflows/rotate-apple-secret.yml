name: Rotate Apple OAuth secret

# Apple's Sign in with Apple client secret expires every ~6 months. We mint a
# fresh 6-month JWT monthly and push it to Supabase, so there's always ~5
# months of validity in hand and the secret never lapses. Also runnable
# on-demand from the Actions tab (workflow_dispatch).
on:
  schedule:
    - cron: "0 6 1 * *" # 06:00 UTC on the 1st of every month
  workflow_dispatch: {}

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Mint + push fresh Apple client secret
        run: node scripts/rotate-apple-secret.mjs
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_SERVICES_ID: ${{ secrets.APPLE_SERVICES_ID }}
          APPLE_SIWA_KEY_P8_BASE64: ${{ secrets.APPLE_SIWA_KEY_P8_BASE64 }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
